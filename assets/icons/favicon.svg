<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Eurovision Tools — pink heart with star">
  <title>Eurovision Tools — pink heart with star</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a0a16" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </radialGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ff5fa3" />
      <stop offset="60%" stop-color="#ff2d78" />
      <stop offset="100%" stop-color="#c81f5e" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- dark rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#bg)" />

  <!-- subtle cyan rim -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="10.5" ry="10.5"
        fill="none" stroke="#00e5ff" stroke-opacity="0.35" stroke-width="1" />

  <!-- heart -->
  <g filter="url(#glow)">
    <path
      d="M32 52
         C 12 38, 6 26, 14 18
         C 20 12, 28 14, 32 22
         C 36 14, 44 12, 50 18
         C 58 26, 52 38, 32 52 Z"
      fill="url(#heart)"
      stroke="#ffe6f0"
      stroke-width="0.8"
      stroke-linejoin="round" />
  </g>

  <!-- yellow 5-point star at heart's optical center -->
  <polygon
    points="32,24 33.6,29 38.8,29 34.6,32.2 36.2,37.2 32,34 27.8,37.2 29.4,32.2 25.2,29 30.4,29"
    fill="#ffd166"
    stroke="#fff3c4"
    stroke-width="0.4"
    stroke-linejoin="round"
    filter="url(#glow)" />
</svg>
